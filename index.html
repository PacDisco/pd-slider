<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pacific Discovery — Slider Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f5f5f3;color:#1a1a1a;font-size:14px;height:100vh;overflow:hidden}
#pd-login{position:fixed;inset:0;background:#f5f5f3;display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#fff;border-radius:12px;border:1px solid #e5e5e3;padding:32px;width:300px;display:flex;flex-direction:column;gap:12px}
.login-box h2{font-size:16px;font-weight:600;color:#1a3a2a}
.login-box p{font-size:12px;color:#888}
.login-box input{width:100%;padding:8px 10px;border:1px solid #e0e0de;border-radius:6px;font-size:13px}
.login-box input:focus{outline:none;border-color:#1D9E75}
.login-box button{padding:10px;background:#1a3a2a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.login-box button:hover{background:#0F6E56}
.login-err{font-size:12px;color:#c0392b;display:none}
#pd-app{display:none;grid-template-columns:220px 1fr 260px;height:100vh;overflow:hidden}
.sidebar{background:#fff;border-right:1px solid #e5e5e3;display:flex;flex-direction:column}
.sh{padding:14px;border-bottom:1px solid #e5e5e3;display:flex;align-items:center;justify-content:space-between}
.sh strong{font-size:13px}
.btn-add{background:#1a3a2a;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
.btn-add:hover{background:#0F6E56}
.sl-list{flex:1;overflow-y:auto;padding:8px}
.sl-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;position:relative}
.sl-item:hover{background:#f5f5f3;border-color:#e5e5e3}
.sl-item.active{background:#f0f7f4;border-color:#1D9E75}
.sl-thumb{width:44px;height:30px;border-radius:4px;background:#e5e5e3;overflow:hidden;flex-shrink:0}
.sl-thumb img{width:100%;height:100%;object-fit:cover}
.sl-meta{flex:1;min-width:0}
.sl-meta .t{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sl-meta .s{font-size:11px;color:#888}
.sl-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:13px;display:none}
.sl-item:hover .sl-del{display:block}
.sl-del:hover{color:#e24b4a}
.editor{overflow-y:auto;padding:20px;background:#f5f5f3;display:flex;flex-direction:column;gap:14px}
.card{background:#fff;border-radius:10px;border:1px solid #e5e5e3;padding:16px}
.card-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.ugrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dz{border:1.5px dashed #d0d0ce;border-radius:8px;cursor:pointer;position:relative;overflow:hidden;background:#fafaf8;min-height:90px;transition:border-color .15s}
.dz:hover{border-color:#1D9E75}
.dz.uploading{border-color:#f0a500;background:#fffbf0;pointer-events:none}
.dz.done{border-color:#1D9E75}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2}
.dz-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 8px;gap:4px;min-height:90px}
.dz-inner .ico{font-size:20px;color:#ccc}
.dz-inner .lbl{font-size:12px;font-weight:500;color:#555}
.dz-inner .sub{font-size:11px;color:#aaa}
.dz img.prev{width:100%;height:90px;object-fit:cover;display:block}
.dz .dstat{font-size:10px;padding:3px 8px;text-align:center;background:#f0f7f4;color:#0F6E56}
.fg{display:flex;flex-direction:column;gap:8px}
.fl{font-size:12px;color:#555;font-weight:500}
.fg input[type=text],.fg input[type=url]{width:100%;padding:8px 10px;border:1px solid #e0e0de;border-radius:6px;font-size:13px;color:#1a1a1a;font-family:inherit;background:#fff}
.fg input:focus{outline:none;border-color:#1D9E75}
.fn{font-size:11px;color:#aaa;margin-top:2px}
.ovrow{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ovrow label{font-size:12px;color:#555;min-width:70px}
input[type=color]{width:36px;height:32px;border:1px solid #e0e0de;border-radius:6px;padding:2px;cursor:pointer}
input[type=range]{flex:1}
.opv{font-size:12px;color:#888;min-width:32px;text-align:right}
.tr{display:flex;align-items:center;justify-content:space-between}
.tog{width:36px;height:20px;border-radius:10px;background:#e0e0de;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0}
.tog.on{background:#1D9E75}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s}
.tog.on::after{left:19px}
.preview-panel{border-left:1px solid #e5e5e3;display:flex;flex-direction:column;background:#fff}
.ph{padding:12px 14px;border-bottom:1px solid #e5e5e3;display:flex;align-items:center;justify-content:space-between}
.ph strong{font-size:13px}
.dt{display:flex;border:1px solid #e5e5e3;border-radius:6px;overflow:hidden}
.db{padding:4px 10px;font-size:11px;border:none;background:none;cursor:pointer;color:#888}
.db.active{background:#f0f7f4;color:#0F6E56;font-weight:500}
.pb{flex:1;display:flex;align-items:center;justify-content:center;padding:14px;overflow:hidden}
.pf{position:relative;overflow:hidden;border-radius:6px;background:#222;width:100%}
.pf.desktop{aspect-ratio:16/6}
.pf.mobile{width:110px;height:190px}
.pf img{width:100%;height:100%;object-fit:cover;display:block}
.pov{position:absolute;inset:0}
.pc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center}
.pc .pt{color:#fff;font-size:12px;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.pc .ps{color:rgba(255,255,255,.9);font-size:10px;margin-top:3px}
.pc .pb2{margin-top:7px;background:rgba(255,255,255,.92);color:#1a1a1a;font-size:9px;padding:4px 10px;border-radius:3px;font-weight:600}
.pempty{display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:12px}
.save-area{padding:12px 14px;border-top:1px solid #e5e5e3;display:flex;flex-direction:column;gap:8px}
.btn-pub{width:100%;padding:9px;background:#1a3a2a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.btn-pub:hover:not(:disabled){background:#0F6E56}
.btn-pub:disabled{background:#ccc;cursor:not-allowed}
.btn-gtm{width:100%;padding:8px;background:none;border:1px solid #e5e5e3;border-radius:8px;font-size:12px;cursor:pointer;color:#555}
.btn-gtm:hover{background:#f5f5f3}
.stat{font-size:11px;text-align:center;padding:6px 8px;border-radius:6px;line-height:1.5;display:none}
.stat.ok{background:#f0f7f4;color:#0F6E56;display:block}
.stat.err{background:#fef0f0;color:#c0392b;display:block}
.stat.loading{background:#fafaf8;color:#888;display:block}
.prog{height:3px;background:#e5e5e3;border-radius:2px;overflow:hidden;display:none}
.prog-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width .3s}
.nosl{display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:13px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999}
.modal{background:#fff;border-radius:12px;padding:24px;width:92%;max-width:580px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:4px}
.modal p{font-size:12px;color:#888;margin-bottom:14px;line-height:1.5}
.modal pre{background:#f5f5f3;border-radius:6px;padding:12px;font-size:10px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;border:1px solid #e5e5e3;max-height:300px;overflow-y:auto}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.btn-copy{flex:1;padding:8px;background:#1a3a2a;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer}
.btn-close{flex:1;padding:8px;border:1px solid #e5e5e3;border-radius:6px;background:none;cursor:pointer;font-size:12px;color:#555}
</style>
</head>
<body>

<div id="pd-login">
  <div class="login-box">
    <h2>Slider Manager</h2>
    <p>Pacific Discovery — internal tool</p>
    <input type="password" id="pd-pw" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="pd-err">Incorrect password</div>
    <button onclick="doLogin()">Sign in</button>
  </div>
</div>

<div id="pd-app">
  <div class="sidebar">
    <div class="sh"><strong>Slides</strong><button class="btn-add" onclick="addSlide()">+ Add slide</button></div>
    <div class="sl-list" id="sl-list"></div>
  </div>
  <div class="editor" id="editor"><div class="nosl">Add or select a slide to begin</div></div>
  <div class="preview-panel">
    <div class="ph">
      <strong>Preview</strong>
      <div class="dt">
        <button class="db active" id="btn-desk" onclick="setDev('desktop')">Desktop</button>
        <button class="db" id="btn-mob" onclick="setDev('mobile')">Mobile</button>
      </div>
    </div>
    <div class="pb"><div class="pf desktop" id="pf"><div class="pempty">No slide selected</div></div></div>
    <div class="save-area">
      <div class="stat" id="stat"></div>
      <div class="prog" id="prog"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <button class="btn-pub" id="btn-pub" onclick="saveConfig()">Save &amp; publish to site</button>
      <button class="btn-gtm" onclick="showGTM()">Get GTM tag code</button>
    </div>
  </div>
</div>

<script>
const PROXY    = 'https://hubspot-proxy.marketing-4e4.workers.dev';
const FOLDER   = 'pacific-discovery-slider';
const CFG_FILE = 'pd-slider-config.json';
const PASSWORD = 'slider2025'; // ← change this

let slides = [], ai = null, dev = 'desktop', idc = 0;
window._cfgUrl = null;

function saveLocal(){
  try{ localStorage.setItem('pd_slides', JSON.stringify(slides)); localStorage.setItem('pd_idc', idc); }catch(e){}
}
function loadLocal(){
  try{
    var s = localStorage.getItem('pd_slides');
    var c = localStorage.getItem('pd_idc');
    if(s){ slides = JSON.parse(s); }
    if(c){ idc = parseInt(c); }
  }catch(e){}
}

function doLogin(){
  if(document.getElementById('pd-pw').value === PASSWORD){
    document.getElementById('pd-login').style.display = 'none';
    document.getElementById('pd-app').style.display = 'grid';
    loadLocal();
    if(slides.length){ ai = 0; }
    render();
  } else {
    document.getElementById('pd-err').style.display = 'block';
  }
}

function uid(){ return 'sl' + (idc++); }
function ns(){ return {id:uid(),title:'Slide title',sub:'Subtitle text',btnText:'Explore now',btnLink:'#',overlayColor:'#000000',overlayOpacity:40,visible:true,desktopUrl:null,mobileUrl:null,desktopName:null,mobileName:null}; }

function addSlide(){ slides.push(ns()); ai = slides.length - 1; saveLocal(); render(); }
function selSlide(i){ ai = i; render(); }
function delSlide(i, e){
  e.stopPropagation();
  slides.splice(i, 1);
  if(ai >= slides.length) ai = slides.length - 1;
  if(!slides.length) ai = null;
  saveLocal(); render();
}
function setDev(d){
  dev = d;
  document.getElementById('btn-desk').className = 'db' + (d==='desktop' ? ' active' : '');
  document.getElementById('btn-mob').className  = 'db' + (d==='mobile'  ? ' active' : '');
  document.getElementById('pf').className = 'pf ' + d;
  renderPreview();
}
function setField(k, v){
  if(ai === null) return;
  slides[ai][k] = v;
  if(['title','visible'].includes(k)) renderSideItem(ai);
  saveLocal(); renderPreview();
}
function togVis(){
  if(ai === null) return;
  slides[ai].visible = !slides[ai].visible;
  saveLocal(); renderEditor(); renderSideItem(ai);
}

function setStat(m, t){ const el=document.getElementById('stat'); el.className='stat '+t; el.textContent=m; }
function showProg(p){
  const bar=document.getElementById('prog'), fill=document.getElementById('prog-fill');
  bar.style.display='block'; fill.style.width=p+'%';
  if(p>=100) setTimeout(function(){ bar.style.display='none'; }, 800);
}

async function getFolder(){
  return '210671463784'; // pacific-discovery-slider folder ID
}

async function hsUpload(blob, name, folderId){
  const fd = new FormData();
  fd.append('file', blob, name);
  fd.append('options', JSON.stringify({access:'PUBLIC_INDEXABLE', overwrite:true}));
  fd.append('fileName', name);
  if(folderId) fd.append('folderId', String(folderId));
  const r = await fetch(PROXY + '/files/v3/files', {method:'POST', body:fd});
  if(!r.ok){ const t=await r.text(); throw new Error('Upload failed ' + r.status + ': ' + t); }
  return (await r.json()).url;
}

async function uploadImage(type, input){
  if(!input.files||!input.files[0]||ai===null) return;
  const file = input.files[0];
  const lbl  = type==='desktopUrl' ? 'desktop' : 'mobile';
  const dz   = document.getElementById('dz-' + lbl);
  if(dz){ dz.className='dz uploading'; dz.innerHTML='<div class="dz-inner"><div class="ico">⏳</div><div class="lbl">Uploading ' + lbl + '…</div></div>'; }
  showProg(20); setStat('Uploading ' + lbl + '…', 'loading');
  try{
    const fid = await getFolder(); showProg(50);
    const url = await hsUpload(file, file.name, fid);
    showProg(100);
    slides[ai][type] = url;
    slides[ai][type==='desktopUrl' ? 'desktopName' : 'mobileName'] = file.name;
    saveLocal();
    setStat(lbl + ' uploaded ✓', 'ok');
    renderEditor(); renderSideItem(ai); renderPreview();
  }catch(err){ showProg(100); setStat('Upload failed: ' + err.message, 'err'); renderEditor(); }
}

async function saveConfig(){
  const btn = document.getElementById('btn-pub'); btn.disabled = true;
  showProg(10); setStat('Saving…', 'loading');
  try{
    const cfg  = {slides: slides.filter(function(s){ return s.visible; }), updatedAt: new Date().toISOString()};
    const blob = new Blob([JSON.stringify(cfg, null, 2)], {type:'application/json'});
    const fid  = await getFolder(); showProg(50);
    window._cfgUrl = await hsUpload(blob, CFG_FILE, fid);
    showProg(100); setStat('Published! Site updates automatically ✓', 'ok');
  }catch(err){ showProg(100); setStat('Save failed: ' + err.message, 'err'); }
  btn.disabled = false;
}

function showGTM(){
  var cfgUrl = window._cfgUrl || 'https://fs.hubspotusercontent.com/hubfs/' + FOLDER + '/' + CFG_FILE;
  var code = '<style>\n'
    + '.banner__slider{display:none!important}\n'
    + '.pd-wrap{width:100%;overflow:hidden;position:relative;background:#111}\n'
    + '.pd-slide{display:none;position:relative}\n'
    + '.pd-slide.active{display:block}\n'
    + '.pd-link{display:block;text-decoration:none;position:relative;overflow:hidden}\n'
    + '.pd-link img{width:100%;display:block;object-fit:cover;min-height:180px}\n'
    + '.pd-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}\n'
    + '.pd-content{position:absolute;top:0;left:0;right:0;bottom:0;display:-webkit-box;display:-ms-flexbox;display:flex;-webkit-box-orient:vertical;-webkit-box-direction:normal;-ms-flex-direction:column;flex-direction:column;-webkit-box-align:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-ms-flex-pack:center;justify-content:center;text-align:center;padding:5%}\n'
    + '.pd-title{color:#fff;font-size:32px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.5);margin-bottom:.3em}\n'
    + '.pd-sub{color:rgba(255,255,255,.9);font-size:18px;text-shadow:0 1px 4px rgba(0,0,0,.4);margin-bottom:.8em}\n'
    + '.pd-btn{background:#fff;color:#1a1a1a;font-size:15px;padding:.55em 1.6em;border-radius:4px;font-weight:700;text-decoration:none}\n'
    + '.pd-dots{position:absolute;bottom:12px;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);display:-webkit-box;display:-ms-flexbox;display:flex;gap:8px;z-index:10}\n'
    + '.pd-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;border:none;padding:0}\n'
    + '.pd-dot.active{background:#fff}\n'
    + '.pd-arr{position:absolute;top:50%;-webkit-transform:translateY(-50%);transform:translateY(-50%);background:rgba(0,0,0,.25);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;z-index:10}\n'
    + '.pd-arr.prev{left:10px}.pd-arr.next{right:10px}\n'
    + '</style>\n'
    + '<script>\n'
    + '(function(){\n'
    + '  fetch("' + cfgUrl + '?cb="+Date.now())\n'
    + '    .then(function(r){return r.json();})\n'
    + '    .then(function(cfg){\n'
    + '      var sl=cfg.slides||[];\n'
    + '      if(!sl.length)return;\n'
    + '      var mob=window.innerWidth<=768;\n'
    + '      var wrap=document.createElement("div");\n'
    + '      wrap.className="pd-wrap";\n'
    + '      var cur=0;\n'
    + '      var allSlides=[];\n'
    + '      var allDots=[];\n'
    + '      var go=function(n){\n'
    + '        allSlides[cur].className="pd-slide";\n'
    + '        allDots[cur].className="pd-dot";\n'
    + '        cur=(n+sl.length)%sl.length;\n'
    + '        allSlides[cur].className="pd-slide active";\n'
    + '        allDots[cur].className="pd-dot active";\n'
    + '      };\n'
    + '      for(var i=0;i<sl.length;i++){\n'
    + '        var s=sl[i];\n'
    + '        var img=mob&&s.mobileUrl?s.mobileUrl:s.desktopUrl;\n'
    + '        var rc=parseInt(s.overlayColor.slice(1,3),16);\n'
    + '        var gc=parseInt(s.overlayColor.slice(3,5),16);\n'
    + '        var bc=parseInt(s.overlayColor.slice(5,7),16);\n'
    + '        var op=(s.overlayOpacity/100).toFixed(2);\n'
    + '        var div=document.createElement("div");\n'
    + '        div.className="pd-slide"+(i===0?" active":"");\n'
    + '        div.innerHTML=\'<a class="pd-link" href="\'+s.btnLink+\'">\'\n'
    + '          +\'<img src="\'+img+\'" alt="\'+s.title+\'">\'\n'
    + '          +\'<div class="pd-overlay" style="background:rgba(\'+rc+","+gc+","+bc+","+op+\')"></div>\'\n'
    + '          +\'<div class="pd-content">\'\n'
    + '          +(s.title?\'<div class="pd-title">\'+s.title+"</div>":"")\n'
    + '          +(s.sub?\'<div class="pd-sub">\'+s.sub+"</div>":"")\n'
    + '          +(s.btnText?\'<span class="pd-btn">\'+s.btnText+"</span>":"")\n'
    + '          +"</div></a>";\n'
    + '        wrap.appendChild(div);\n'
    + '        allSlides.push(div);\n'
    + '      }\n'
    + '      if(sl.length>1){\n'
    + '        var prev=document.createElement("button");\n'
    + '        prev.className="pd-arr prev";\n'
    + '        prev.innerHTML="&#8249;";\n'
    + '        var next=document.createElement("button");\n'
    + '        next.className="pd-arr next";\n'
    + '        next.innerHTML="&#8250;";\n'
    + '        var dots=document.createElement("div");\n'
    + '        dots.className="pd-dots";\n'
    + '        for(var j=0;j<sl.length;j++){\n'
    + '          var dot=document.createElement("button");\n'
    + '          dot.className="pd-dot"+(j===0?" active":"");\n'
    + '          (function(idx){dot.onclick=function(){go(idx);};})(j);\n'
    + '          dots.appendChild(dot);\n'
    + '          allDots.push(dot);\n'
    + '        }\n'
    + '        prev.onclick=function(){go(cur-1);};\n'
    + '        next.onclick=function(){go(cur+1);};\n'
    + '        wrap.appendChild(prev);\n'
    + '        wrap.appendChild(next);\n'
    + '        wrap.appendChild(dots);\n'
    + '        setInterval(function(){go(cur+1);},5000);\n'
    + '      }\n'
    + '      var b=document.querySelector(".banner__slider");\n'
    + '      if(b){b.style.display="none";b.parentNode.insertBefore(wrap,b.nextSibling);}\n'
    + '      else{document.body.insertBefore(wrap,document.body.firstChild);}\n'
    + '    }).catch(function(e){console.warn("PD Slider:",e);});\n'
    + '})();\n'
    + '<\/script>';

  window._gtmCode = code;
  const m = document.createElement('div'); m.className = 'modal-bg';
  m.innerHTML = '<div class="modal"><h3>GTM Custom HTML tag</h3><p>One-time setup — paste into a <strong>Custom HTML</strong> tag in GTM, trigger on <strong>All Pages</strong>, publish. After that every "Save &amp; publish" here updates the live site automatically.</p><pre>' + code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre><div class="modal-btns"><button class="btn-copy" onclick="doCopy(this)">Copy code</button><button class="btn-close" onclick="this.closest(\'.modal-bg\').remove()">Close</button></div></div>';
  document.body.appendChild(m);
}

window.doCopy = function(btn){
  navigator.clipboard.writeText(window._gtmCode||'').then(function(){ btn.textContent='Copied!'; setTimeout(function(){ btn.textContent='Copy code'; }, 2000); });
};

function renderPreview(){
  const f = document.getElementById('pf');
  if(ai===null||!slides[ai]){ f.innerHTML='<div class="pempty">No slide selected</div>'; return; }
  const s=slides[ai], img=dev==='desktop'?s.desktopUrl:s.mobileUrl;
  const r=parseInt(s.overlayColor.slice(1,3),16),g=parseInt(s.overlayColor.slice(3,5),16),b=parseInt(s.overlayColor.slice(5,7),16);
  const op=(s.overlayOpacity/100).toFixed(2);
  f.innerHTML = (img ? '<img src="'+img+'" alt="">' : '<div style="width:100%;height:100%;background:#444;display:flex;align-items:center;justify-content:center;color:#888;font-size:11px">No image yet</div>')
    + '<div class="pov" style="background:rgba('+r+','+g+','+b+','+op+')"></div>'
    + '<div class="pc">'+(s.title?'<div class="pt">'+s.title+'</div>':'')+(s.sub?'<div class="ps">'+s.sub+'</div>':'')+(s.btnText?'<div class="pb2">'+s.btnText+'</div>':'')+'</div>';
}

function renderSideItem(i){
  const s=slides[i], el=document.getElementById('si-'+i); if(!el) return;
  el.querySelector('.t').textContent = s.title||'Untitled';
  el.querySelector('.s').textContent = s.visible?'Visible':'Hidden';
  el.querySelector('.sl-thumb').innerHTML = s.desktopUrl ? '<img src="'+s.desktopUrl+'" alt="">' : '';
}

function renderSidebar(){
  const list = document.getElementById('sl-list'); list.innerHTML='';
  slides.forEach(function(s,i){
    const d=document.createElement('div'); d.className='sl-item'+(i===ai?' active':''); d.id='si-'+i; d.onclick=function(){selSlide(i);};
    d.innerHTML = '<div class="sl-thumb">'+(s.desktopUrl?'<img src="'+s.desktopUrl+'" alt="">':'')+'</div>'
      +'<div class="sl-meta"><div class="t">'+(s.title||'Untitled')+'</div><div class="s">'+(s.visible?'Visible':'Hidden')+'</div></div>'
      +'<button class="sl-del" onclick="delSlide('+i+',event)">✕</button>';
    list.appendChild(d);
  });
}

function renderEditor(){
  const ed = document.getElementById('editor');
  if(ai===null||!slides[ai]){ ed.innerHTML='<div class="nosl">Add or select a slide to begin</div>'; return; }
  const s=slides[ai];
  ed.innerHTML = ''
    +'<div class="card"><div class="card-title">Images</div><div class="ugrid">'
    +'<div><div class="fl" style="margin-bottom:6px">Desktop</div>'
    +'<div class="dz'+(s.desktopUrl?' done':'')+'" id="dz-desktop">'
    +'<input type="file" accept="image/*" onchange="uploadImage(\'desktopUrl\',this)">'
    +(s.desktopUrl?'<img class="prev" src="'+s.desktopUrl+'" alt=""><div class="dstat">'+(s.desktopName||'Uploaded')+' ✓</div>':'<div class="dz-inner"><div class="ico">+</div><div class="lbl">Desktop image</div><div class="sub">Click or drag</div></div>')
    +'</div></div>'
    +'<div><div class="fl" style="margin-bottom:6px">Mobile</div>'
    +'<div class="dz'+(s.mobileUrl?' done':'')+'" id="dz-mobile">'
    +'<input type="file" accept="image/*" onchange="uploadImage(\'mobileUrl\',this)">'
    +(s.mobileUrl?'<img class="prev" src="'+s.mobileUrl+'" alt=""><div class="dstat">'+(s.mobileName||'Uploaded')+' ✓</div>':'<div class="dz-inner"><div class="ico">+</div><div class="lbl">Mobile image</div><div class="sub">Click or drag</div></div>')
    +'</div></div></div></div>'
    +'<div class="card"><div class="card-title">Overlay</div>'
    +'<div class="ovrow"><label>Colour</label><input type="color" value="'+s.overlayColor+'" oninput="setField(\'overlayColor\',this.value)"></div>'
    +'<div class="ovrow"><label>Opacity</label><input type="range" min="0" max="100" step="1" value="'+s.overlayOpacity+'" oninput="setField(\'overlayOpacity\',+this.value);document.getElementById(\'opv\').textContent=this.value+\'%\'"><span class="opv" id="opv">'+s.overlayOpacity+'%</span></div>'
    +'</div>'
    +'<div class="card"><div class="card-title">Text &amp; button</div><div class="fg">'
    +'<div class="fl">Slide title</div><input type="text" value="'+s.title+'" oninput="setField(\'title\',this.value)" placeholder="Main headline">'
    +'<div class="fl">Subtitle</div><input type="text" value="'+s.sub+'" oninput="setField(\'sub\',this.value)" placeholder="Supporting text">'
    +'<div class="fl">Button text</div><input type="text" value="'+s.btnText+'" oninput="setField(\'btnText\',this.value)" placeholder="e.g. Learn more">'
    +'<div class="fl">Button / slide link</div><input type="url" value="'+s.btnLink+'" oninput="setField(\'btnLink\',this.value)" placeholder="https://...">'
    +'<div class="fn">The entire slide is clickable using this link</div>'
    +'</div></div>'
    +'<div class="card"><div class="card-title">Visibility</div>'
    +'<div class="tr"><span style="font-size:13px">Show on site</span><button class="tog'+(s.visible?' on':'')+'" onclick="togVis()"></button></div>'
    +'</div>';
}

function render(){ renderSidebar(); renderEditor(); renderPreview(); }
</script>
</body>
</html>
